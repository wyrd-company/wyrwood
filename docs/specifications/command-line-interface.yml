$schema: https://refinery.systems/ontology/specification
relationships:
  uses: control-interface
  references: configuration
format: json-schema
description: >-
  Wyrwood provides non-interactive `init`, `apply`, `keys`, `status`, `events`,
  `configuration`, `consumer`, and `service` commands. `init` is the only
  management command that
  accesses configuration storage directly: it atomically creates the default
  owner-only configuration from `SSH_AUTH_SOCK`. Every runtime operation resolves the
  daemon's default per-user control socket and invokes exactly one operation on
  control protocol version 1. The CLI does not accept a control path, a
  configuration path, or a request-deadline override and therefore cannot
  create another configuration authority or runtime mutation path. A complete
  control exchange is bounded to 65 seconds. `events` defaults to 100 records
  and accepts a limit from 1 through 1000.

  `configuration show` follows coherent control pages and prints the complete
  approved editable model and exact revision. `configuration set-upstream`
  requires `--revision` and one complete `--socket` value.
  `configuration set-timeouts` requires `--revision` and complete `--connect`,
  `--list`, `--replay`, and `--sign` values. `consumer put` requires a revision,
  complete name and socket, zero or one numeric access group, and zero or more
  repeated exact fingerprints. Omitting `--id` creates a consumer; supplying the
  opaque identifier returned by `configuration show` replaces that consumer.
  `consumer retire` requires a revision and opaque consumer identifier. These
  commands invoke the corresponding daemon operations and print the resulting
  durable revision. Consumer put and retire also print the affected opaque
  consumer identifier; replacing a socket path reports the new identifier while
  selecting the old identifier in the request. They do not apply it. `apply`
  remains the explicit runtime transition. Comments from `keys` are display data
  and are never accepted in place of fingerprints.

  Human-readable output is the default. `--output json` emits exactly one JSON
  object and newline whose version-1 contract is defined by
  `assets/command-line-interface/command-output.schema.json`. The human and JSON
  projections contain the same operation information. Human display fields and
  paths are quoted so control characters cannot inject terminal records. JSON
  errors are written to standard error; successful JSON is written to standard
  output. Errors are categorical and actionable and never include raw
  filesystem, configuration-parser, daemon, protocol, or upstream errors. `apply`
  succeeds only when the daemon reports that the candidate configuration
  committed. A committed result can report degraded cleanup and remains a
  successful apply because the active configuration changed.

  Exit status 0 means the command completed successfully. Status 1 is a local
  operational or output failure and remains the status for commands whose
  dedicated implementation is absent. Status 2 is command-line usage failure.
  Status 3 is initialization failure or uncertain initialization durability.
  Status 4 means the daemon path, connection, exchange, or protocol version was
  unavailable. Status 5 means apply or a managed mutation rejected invalid
  configuration. Status 6 means the daemon could not complete a valid operation
  or did not commit apply.
  Status 7 means the configured upstream agent was unavailable. Health and
  retained policy-denial events and an absent service status are successful
  query results, not command failures. Linux service-manager unavailability or
  an incomplete service operation uses status 1. Starting or stopping an absent
  unit also uses status 1 with the distinct `service-not-installed` category.
  Status 8 means the supplied configuration revision is stale. Status 9 means a
  configuration replacement was published but its durability is uncertain.
  Status 10 means a consumer selected for replacement or retirement does not
  exist at the supplied current revision.

  Human and JSON status output carry the daemon's truncation marker. A truncated
  status result is labeled incomplete runtime observability and never implies
  that consumers omitted from the status projection are absent from the fully
  paginated configuration.

  `daemon` continues to delegate directly to the per-user daemon runtime and
  handles SIGINT and SIGTERM. `service install|remove|start|stop|status` delegates
  to the Linux per-user systemd adapter and supports the same human or closed
  JSON output selection. `tui` launches the terminal interface described by the
  terminal-interface specification and reports terminal initialization failure
  as status 1 before changing terminal state.
validation-criteria: >-
  Command tests verify exact human projections and versioned JSON structure for
  runtime and service commands; categorical stable failures and exit statuses;
  invalid configuration, stale revision, missing consumer, uncertain configuration durability,
  unavailable daemon, unavailable upstream, absent
  service installation, and retained policy denial; default and bounded event
  limits; quoted display data; committed apply enforcement; exclusive use of the
  local control client for configuration and runtime commands; and schema parity
  with implementation constants and result fields. Tests also verify coherent
  configuration pagination, exact create-versus-replace grammar, complete
  fingerprint replacement, affected consumer identifiers including a path-change
  replacement, exact `configuration-not-found` status 10 behavior, status
  truncation wording, and that persisted mutations remain unapplied. The
  Linux milestone gate exercises the same fixed
  owner-authenticated control operations used by the runtime commands while the
  container scenario changes policy, queries events, and restarts the daemon.
