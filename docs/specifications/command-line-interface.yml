$schema: https://refinery.systems/ontology/specification
relationships:
  uses: control-interface
  references: configuration
format: json-schema
description: >-
  Wyrwood provides non-interactive `init`, `apply`, `keys`, `status`, and
  `events` commands. `init` is the only management command that accesses
  configuration storage directly: it atomically creates the default owner-only
  configuration from `SSH_AUTH_SOCK`. Every runtime operation resolves the
  daemon's default per-user control socket and invokes exactly one operation on
  control protocol version 1. The CLI does not accept a control path, a
  configuration path, or a request-deadline override and therefore cannot
  create another configuration authority or runtime mutation path. A complete
  control exchange is bounded to 65 seconds. `events` defaults to 100 records
  and accepts a limit from 1 through 1000.

  Human-readable output is the default. `--output json` emits exactly one JSON
  object and newline whose version-1 contract is defined by
  `assets/command-line-interface/command-output.schema.json`. The human and JSON
  projections contain the same operation information. Human display fields and
  paths are quoted so control characters cannot inject terminal records. JSON
  errors are written to standard error; successful JSON is written to standard
  output. Errors are categorical and actionable and never include raw
  filesystem, configuration, daemon, protocol, or upstream errors. `apply`
  succeeds only when the daemon reports that the candidate configuration
  committed. A committed result can report degraded cleanup and remains a
  successful apply because the active configuration changed.

  Exit status 0 means the command completed successfully. Status 1 is a local
  operational or output failure and remains the status for commands whose
  dedicated implementation is absent. Status 2 is command-line usage failure.
  Status 3 is initialization failure or uncertain initialization durability.
  Status 4 means the daemon path, connection, exchange, or protocol version was
  unavailable. Status 5 means apply rejected invalid configuration. Status 6
  means the daemon could not complete a valid operation or did not commit apply.
  Status 7 means the configured upstream agent was unavailable. Health and
  retained policy-denial events are successful query results, not command
  failures.

  `daemon` continues to delegate directly to the per-user daemon runtime and
  handles SIGINT and SIGTERM. `tui` and `service` are reserved for their
  dedicated implementations.
validation-criteria: >-
  Command tests verify exact human projections and versioned JSON structure for
  all five commands; categorical stable failures and exit statuses; invalid
  configuration, unavailable daemon, unavailable upstream, and retained policy
  denial; default and bounded event limits; quoted display data; committed apply
  enforcement; exclusive use of the local control client for runtime commands;
  and schema parity with implementation constants and result fields.
