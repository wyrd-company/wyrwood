$schema: https://refinery.systems/ontology/technical-design
relationships: {}
objective: >-
  On a Linux host, provide stable per-container SSH-agent endpoints that expose only
  explicitly selected host-managed keys, recover from upstream socket
  replacement, and remain diagnosable without retaining privileged information.
background:
  current-design: >-
    Container runtimes can mount a host SSH-agent socket into a container, but
    the mount grants the container every authority exposed by that socket. A
    file bind mount also pins the mounted socket inode, so deleting and
    recreating the host socket does not update the endpoint visible inside an
    already-running container.
  problems:
    - A shared upstream socket gives every mounted container the same key access.
    - Recreated upstream socket files strand running containers on stale inodes.
    - Agent outages can leave authentication commands blocked without useful diagnosis.
    - Raw protocol logging can disclose authentication material or destination context.
design-challenges:
  authorization-boundary: >-
    The SSH-agent protocol identifies keys but does not identify containers or
    processes. Authorization therefore belongs to the consumer endpoint whose
    filesystem access is controlled by the user and container runtime.
  connection-state: >-
    OpenSSH destination restrictions use session-bind messages scoped to one
    agent connection. Replacing an upstream connection must reconstruct that
    state before forwarding more requests from the paired downstream client.
  atomic-policy-change: >-
    Allowlist edits must affect requests already arriving on open client
    connections without partially applying a configuration across consumers.
  bounded-failure: >-
    Connection recovery must fail quickly while signing must permit an
    upstream application to wait for human approval. Neither case can block
    indefinitely or leave a timed-out protocol stream in use.
  platform-boundary: >-
    A Linux host can expose an AF_UNIX socket to a Linux container through a
    directory bind mount. Docker Desktop places Linux containers inside a
    virtual machine and provides its own host-service bridge for SSH-agent
    forwarding, so arbitrary host sockets do not share the Linux delivery
    mechanism. Platform-neutral policy and protocol components must not depend
    on the Linux endpoint adapter.
proposed-design:
  high-level-overview: >-
    One unprivileged Wyrwood daemon runs for each logged-in operating-system
    user. It binds one consumer listener per configured container and connects
    every accepted downstream client to its own connection on one configured
    upstream SSH-agent endpoint. The consumer socket path is the security
    principal: its current explicit fingerprint allowlist filters identities
    and signing on every request. Consumer listeners remain available while
    the upstream is absent or replaced. The same local control interface
    serves the scriptable command-line interface and terminal user interface.
  process-and-ownership: >-
    Wyrwood reads one configuration file and stores runtime state beneath the
    platform's per-user application directories. On Unix systems, runtime
    and control directories are owner-only. A consumer without a configured
    group uses mode 0700 for its parent directory and mode 0600 for its socket.
    A consumer with a configured numeric group uses mode 0710 for its parent
    directory and mode 0660 for its socket, with both entries assigned to that
    group. The daemon user must own the dedicated leaf parent directory. Wyrwood
    creates that leaf with mode 0700 only when its ancestor already exists; it
    does not create missing ancestors. Existing parents are opened as real
    directories without following a final symlink. Directory and socket modes
    are applied and verified exactly, and configured group assignment must
    name one of the daemon user's effective or supplementary groups and succeed
    before preparation can commit. Linux pathname sockets must fit the 107-byte
    AF_UNIX path limit. A container process reaches the socket as the daemon UID,
    through root DAC override, or through the configured group.
    Every host or container process with that filesystem access shares the
    consumer's authority. The daemon restores configured consumer listeners at
    login without requiring the upstream endpoint to be available. It holds no
    private keys; private-key operations remain inside the upstream agent.
  configuration-and-apply: >-
    The human-readable YAML configuration is the source of truth for the
    upstream socket path and consumer definitions. Initial configuration uses
    the process's SSH_AUTH_SOCK value when present, then persists that exact path
    rather than following later environment changes. A consumer contains a
    display name, an absolute socket path, an optional numeric access group, and
    exact SHA-256 public-key fingerprints. Direct file edits do not change
    runtime state. Apply asks the daemon to read and validate the complete file,
    including absolute and unique paths, dedicated parent directories, directory
    ownership, access groups, distinct consumers, valid fingerprints, and
    supported timeout bounds. Validation creates an immutable runtime snapshot
    before any listener changes. A different socket path is a different consumer
    security principal.
  transactional-apply: >-
    Listener reconciliation has a prepare and commit boundary. Prepare creates
    every new parent directory and binds every new listener without accepting
    clients. An owned existing socket is removed as stale only when a stream
    connection probe returns connection-refused; a live listener, foreign
    socket, symlink, or non-socket entry blocks preparation. Preparation records
    prior metadata for active endpoints whose access settings change. If any
    preparation step fails, Wyrwood closes and removes every staged listener and
    socket file and restores prior active endpoint metadata, leaving the active
    snapshot, listeners, and policies unchanged. Parent directories remain in
    place, including directories created during preparation. Commit publishes
    the new immutable configuration, activates staged listeners, and updates the
    policy references used by retained listeners as one in-memory state
    transition. An upstream path or timeout change closes retained client pairs
    so reconnecting clients cannot continue with obsolete connection settings.
    Commit then closes retired listeners and all of their downstream and paired
    upstream connections. Socket cleanup compares the created device and inode
    before unlinking, so a replacement directory entry is never removed. A
    post-commit cleanup failure is reported as degraded health and retried in the
    background; it does not restore an obsolete authorization policy or listener.
  consumer-endpoints: >-
    The user assigns each socket path and mounts its dedicated parent directory
    into exactly the intended container. Wyrwood creates the socket inside that
    directory. Replacing the socket therefore updates the directory entry
    visible through the mount instead of relying on a bind-mounted socket
    inode. Retiring a consumer stops its listener, closes its downstream and
    paired upstream connections, and removes only its socket file. The daemon
    never removes the user-selected parent directory. Listener accept loops
    begin only after the complete runtime snapshot commits, so a staged socket
    can accumulate kernel connections but cannot process a request under the old
    policy. Each accepted connection is tracked until it exits so retirement can
    close every active pair before cleanup.
  protocol-enforcement: >-
    Wyrwood implements the SSH-agent framing needed to inspect every request.
    Identity enumeration returns only keys whose ssh.FingerprintSHA256 value is
    in the consumer's current allowlist. Signing resolves the requested public
    key to its fingerprint and consults the current policy immediately before
    forwarding. Requests to add or remove identities, remove all identities,
    lock, and unlock are rejected. Extensions are denied by default.
    session-bind@openssh.com is explicitly supported and forwarded so upstream
    destination-restriction enforcement remains active. Agent comments are
    display data and never authorization identity.
  connection-and-recovery: >-
    Each accepted downstream connection owns one upstream connection; upstream
    streams are never shared or pooled. Accepted session-bind messages are kept
    in memory for the lifetime of that downstream connection. If the upstream
    stream fails, Wyrwood fails that request without retrying it, closes the
    stream, and makes a bounded connection attempt before the next request. A
    reconstructed stream replays the connection's accepted bindings in their
    original order before forwarding that next request. The replay journal
    retains the first accepted raw request for at most 16 unique parsed host-key
    and session-identifier pairs, matching OpenSSH's per-connection limit.
    Semantically duplicate requests still reach the upstream for validation but
    do not create replay entries; a seventeenth unique pair is rejected before
    it reaches the upstream. One replay deadline bounds the complete replay
    sequence, and the same deadline bounds a newly forwarded session-bind
    exchange. Connect and identity-list operations use their short configurable
    deadlines for the complete operation. Signing uses its separate longer
    deadline for the complete request and response so an upstream application
    can wait for human approval. Connect, operation, or replay failure returns
    an agent failure while the downstream listener remains available. Every
    failed or timed-out protocol stream is closed and rebuilt on a later request
    because a delayed response would make that stream unsafe to reuse.
  control-interface: >-
    Wyrwood exposes a versioned request-response control API only through an
    owner-only Unix-domain socket. The Linux transport verifies the peer UID from
    kernel credentials against the daemon UID in addition to filesystem
    permissions. No TCP listener exists. The single wyrwood executable provides
    daemon, init, apply, keys, status, events, tui, and service subcommands. Init
    creates the per-user configuration using SSH_AUTH_SOCK as the initial
    upstream path when present. Keys returns upstream comments as display labels
    and fingerprints as selection identity. Human-readable output is the
    terminal default and structured output is available for automation. The
    terminal interface uses the same API for upstream selection with path
    browsing or manual entry, consumer editing, key selection, apply, health,
    and event inspection.
  runtime-observability: >-
    Live state records daemon readiness, configured upstream reachability, each
    consumer listener state, active connection counts, and categorical recent
    failures. A bounded durable event log stores timestamp, opaque consumer
    identifier, operation, key fingerprint when relevant, outcome, latency,
    and categorical error code. A fingerprint is retained as a stable key
    identifier and can correlate activity involving the same public key. Event
    construction uses a closed type without open-ended attributes. Events contain
    no signing payloads, signatures, public-key bytes, agent comments, filesystem
    paths, destinations, raw client messages, or raw upstream errors. Owner-only
    storage survives daemon restart and compacts through an atomic replacement.
  platform-lifecycle: >-
    The Linux adapter installs, removes, starts, stops, and inspects a systemd
    user service. It supplies Linux configuration, data, and runtime locations,
    the Unix control transport, consumer AF_UNIX listeners, ownership and group
    access, and directory-mount semantics. Policy, SSH-agent framing, connection
    recovery, configuration, and event types depend on platform interfaces rather
    than the Linux adapter. Other host operating systems require platform
    technical designs that define both login startup and container-reachable
    consumer delivery; they do not reuse Linux directory mounts by assumption.
  package-boundaries: >-
    The Go module separates command dispatch, configuration, agent protocol,
    policy, connection management, endpoint reconciliation, control transport,
    events, platform paths, and service integration. Interfaces exist at the
    operating-system and upstream-agent boundaries. Protocol and policy tests
    use in-memory connections; lifecycle tests use real Unix sockets and
    temporary directories.
  verification: >-
    Unit tests cover configuration invariants, operation filtering, fingerprint
    authorization, policy changes on open connections, session-binding replay,
    deadline handling, event redaction by construction, and atomic endpoint
    reconciliation. Linux integration tests run a controllable upstream agent,
    mount or model the consumer parent directory, replace the upstream socket
    at the same path, and verify that the same consumer endpoint resumes
    allowed signing while hidden and removed keys remain denied.
