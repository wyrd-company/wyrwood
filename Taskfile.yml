# relationships: {}
# ---

version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  format:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  format:check:
    desc: Check Go source formatting
    cmds:
      - test -z "$(gofmt -l .)"

  test:
    desc: Run the test suite
    cmds:
      - go test ./...

  test:release-manifest:
    desc: Test the package release manifest generator
    cmds:
      - python3 -m unittest scripts/create-release-manifest_test.py

  test:integration:linux:
    desc: Run all real Linux milestone gates
    cmds:
      - go test -count=1 -tags=integration ./internal/integration

  test:integration:management:
    desc: Run the real Linux management milestone gate
    cmds:
      - >-
        go test -count=1 -tags=integration
        -run '^TestLinuxManagementMilestone$' ./internal/integration

  vet:
    desc: Run Go static analysis
    cmds:
      - go vet ./...

  docs:check:
    desc: Lint repository artifacts
    cmds:
      - rumdl check .
      - ryl check . --markdown

  build:
    desc: Build the Wyrwood executable
    cmds:
      - go build ./cmd/wyrwood

  release:check:
    desc: Validate the GoReleaser configuration
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@v2.17.0 check .goreleaser.yaml

  release:ci:
    desc: Run portable validation required before a release
    deps:
      - build
      - format:check
      - release:check
      - test
      - test:release-manifest
      - vet

  release:snapshot:
    desc: Build local release artifacts without publishing
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --snapshot --clean

  workflows:check:
    desc: Validate GitHub Actions workflows
    cmds:
      - actionlint

  check:
    desc: Run all repository checks
    deps:
      - build
      - docs:check
      - format:check
      - release:check
      - test
      - test:release-manifest
      - vet
      - workflows:check
