# ---
# relationships: {}
# ---

version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  format:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  format:check:
    desc: Check Go source formatting
    cmds:
      - test -z "$(gofmt -l .)"

  test:
    desc: Run the test suite
    cmds:
      - go test ./...

  test:release-manifest:
    desc: Test the package release manifest generator
    cmds:
      - python3 -m unittest scripts/create-release-manifest_test.py

  test:integration:linux:
    desc: Run all real Linux milestone gates
    cmds:
      - go test -count=1 -tags=integration ./internal/integration

  test:integration:management:
    desc: Run the real Linux management milestone gate
    cmds:
      - >-
        go test -count=1 -tags=integration
        -run '^TestLinuxManagementMilestone$' ./internal/integration

  vet:
    desc: Run Go static analysis
    cmds:
      - go vet ./...

  scripts:check:
    desc: Check release automation scripts and publishing contracts
    cmds:
      - bash -n scripts/*.sh
      - python3 -m py_compile scripts/*.py
      - cd scripts && ./check-publishing-secret-contract.sh

  docs:check:
    desc: Lint repository artifacts
    cmds:
      - rumdl check .
      - ryl check . --markdown

  docs:demo:
    desc: Regenerate the public documentation demo
    deps:
      - build
    cmds:
      - PATH="$PWD:$PATH" vhs docs/demo.tape

  build:
    desc: Build the Wyrwood executable
    cmds:
      - go build ./cmd/wyrwood

  release:check:
    desc: Validate the GoReleaser configuration
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@v2.17.0 check .goreleaser.yaml

  release:ci:
    desc: Run portable validation required before a release
    deps:
      - build
      - format:check
      - release:check
      - scripts:check
      - test
      - test:release-manifest
      - vet

  release:compatibility:
    desc: Build packages and prove the pinned repository publisher contract
    requires:
      vars:
        - PUBLISHER_ROOT
        - PUBLISHER_COMMIT
        - RELEASE_VERSION
        - RELEASE_COMMIT
    deps:
      - release:ci
    cmds:
      - >-
        RELEASE_VERSION="{{.RELEASE_VERSION}}"
        go run github.com/goreleaser/goreleaser/v2@v2.17.0
        release --snapshot --clean
      - >-
        scripts/create-release-manifest.py
        --artifacts-dir dist
        --version "{{.RELEASE_VERSION}}"
        --commit "{{.RELEASE_COMMIT}}"
        --output dist/release-manifest.json
      - >-
        scripts/validate-publisher-contract.sh
        "{{.PUBLISHER_ROOT}}"
        "{{.PUBLISHER_COMMIT}}"
        dist/release-manifest.json
        dist
        dist/publisher-contract

  release:snapshot:
    desc: Build local release artifacts without publishing
    cmds:
      - >-
        RELEASE_VERSION="${RELEASE_VERSION:-0.0.0}"
        go run github.com/goreleaser/goreleaser/v2@v2.17.0
        release --snapshot --clean

  workflows:check:
    desc: Validate GitHub Actions workflows
    cmds:
      - actionlint

  check:
    desc: Run all repository checks
    deps:
      - build
      - docs:check
      - format:check
      - release:check
      - scripts:check
      - test
      - test:release-manifest
      - vet
      - workflows:check
